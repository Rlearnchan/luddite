# Example Google Sheet append config for jibi candidates.
#
# Keep real spreadsheet ids and credential paths in environment variables or
# config/google_sheets.local.yaml. Do not commit service account JSON files.

spreadsheet_id: null
target_sheet_name: "jibi 후보"
source_preview_csv: null
dry_run_default: true
create_sheet_if_missing: true
create_header_if_missing: true
skip_duplicates: true
duplicate_keys:
  - duplicate_key
  - source_url_canonical
styling:
  enabled: false
auth_mode: service_account
service_account_json_path: null
