# jibi source registry v0.9.3
#
# This is a design/runtime registry for local/manual MVP scoring. It does not
# enable an RSS collector by itself.
#
# Source lifecycle:
#   rss_candidate -> fetch test passes -> rss_verified
#
# Source status model:
#   rss_candidate: candidate endpoint, not verified yet
#   rss_verified: fetch + parse test passed
#   rss_failed: endpoint candidate failed; keep reason in probe report
#   subscription_manual: paid/manual source; never auto-fetch
#   manual: human-entered source
#   official_evidence: evidence/numbers source, not primary seed discovery
#   disabled: temporarily inactive
#
# Optional RSS probe fields:
#   rss_index_url: RSS directory/index page to inspect for feed links
#   desired_feed: preferred feed label on an RSS index page
#   feed_url_candidates: explicit feed URLs to try before known-path discovery
#   verified_feed_url: feed URL that passed fetch + parse probe
#   terms_check_required: true until usage scope/terms are reviewed
#   collection_enabled: false until operations explicitly permit collection
#   last_probe_status / last_probe_at / failure_reason: human-maintained probe notes
#
# Operational rules:
#   - overseas seed discovery first; domestic bridge/evidence second
#   - subscription_manual sources are never auto-fetched
#   - official_release sources can be seed candidates when the feed itself is
#     editorial/research-like, and evidence/numbers otherwise.

sources:
